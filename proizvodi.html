<!DOCTYPE html>
<html>
<head>
    <title>Sports Shop</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .product {
            border: 1px solid black;
            width: 250px;
            padding: 10px;
            margin: 20px;
            display: inline-block;
        }

        img {
            width: 200px;
            height: 200px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h1>Sports Shop</h1>

    <div class="product">
        <img src="basketball.jpg" alt="Basketball">
        <h2>Basketball</h2>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="smartwatch.jpg" alt="Smart Watch">
        <h2>Smart Watch</h2>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="tshirt.jpg" alt="T-Shirt">
        <h2>Sports T-Shirt</h2>
        <button>Add to Cart</button>
    </div>

</body>
</html>
